            background: radial-gradient(circle at center, rgba(20, 19, 19, 0) 0%, rgba(20, 19, 19, 1) 100%);
        }

        .manga-overlay {
            mask-image: linear-gradient(to bottom, transparent, black, transparent);

<script>
        // Micro-interaction: Mouse tracking glow
        document.addEventListener('mousemove', (e) => {
            const glow = document.querySelector('.cinematic-bg');
            if (glow) {
                const x = (e.clientX / window.innerWidth) * 100;
                const y = (e.clientY / window.innerHeight) * 100;
                glow.style.background = `radial-gradient(circle at ${x}% ${y}%, rgba(255, 255, 255, 0.03) 0%, rgba(20, 19, 19, 1) 70%)`;
            }
        });

        // Icon hydration
        document.querySelectorAll('[data-icon]').forEach(el => {
            const iconName = el.getAttribute('data-icon');
            el.classList.add('material-symbols-outlined');
            el.textContent = iconName;
        });
    </script>
