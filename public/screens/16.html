<script>
        // Progress Bar Logic
        window.onscroll = function() {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 100;
            document.getElementById("reading-progress").style.width = scrolled + "%";

            // Scroll to top button visibility
            const scrollBtn = document.getElementById('scrollToTop');
            if (winScroll > 500) {
                scrollBtn.classList.remove('opacity-0', 'translate-y-4');
                scrollBtn.classList.add('opacity-100', 'translate-y-0');
            } else {
                scrollBtn.classList.add('opacity-0', 'translate-y-4');
                scrollBtn.classList.remove('opacity-100', 'translate-y-0');
            }
        };

        // Scroll to Top action
        document.getElementById('scrollToTop').addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Simple Intersection Observer for Fade-in Effect
        const observerOptions = {
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = "1";
                    entry.target.style.transform = "translateY(0)";
                }
            });
        }, observerOptions);

        document.querySelectorAll('.manga-page-container').forEach(page => {
            page.style.opacity = "0.3";
            page.style.transform = "translateY(20px)";
            page.style.transition = "all 0.8s cubic-bezier(0.16, 1, 0.3, 1)";
            observer.observe(page);
        });
    </script>
