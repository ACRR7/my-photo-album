<!DOCTYPE html>

<html class="dark" lang="uz"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&amp;display=swap" rel="stylesheet"/>
<style>
        @font-face {
            font-family: 'Geist';
            src: url('https://cdn.jsdelivr.net/npm/geist@1.0.3/dist/fonts/geist-sans/Geist-Medium.woff2') format('woff2');
        }
        body {
            font-family: 'Geist', sans-serif;
            background-color: #000000;
            color: #e5e2e1;
            margin: 0;
            display: flex;
            justify-content: center;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom Scrollbar for the dark theme */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0d0d0d;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #333333;
            border-radius: 2px;
        }
        .chapter-row:active {
            background-color: #1a1a1a;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "tertiary-fixed": "#e2e2e2",
                      "surface-container-highest": "#353434",
                      "secondary-fixed-dim": "#c7c6c6",
                      "on-primary-fixed": "#1a1c1c",
                      "tertiary-container": "#e2e2e2",
                      "secondary": "#c7c6c6",
                      "on-primary-fixed-variant": "#454747",
                      "secondary-fixed": "#e4e2e2",
                      "outline-variant": "#444748",
                      "outline": "#8e9192",
                      "on-primary-container": "#636565",
                      "on-secondary": "#303031",
                      "error": "#ffb4ab",
                      "on-tertiary-fixed-variant": "#454747",
                      "on-primary": "#2f3131",
                      "on-error": "#690005",
                      "on-tertiary": "#2f3131",
                      "surface-tint": "#c6c6c7",
                      "surface": "#141313",
                      "inverse-surface": "#e5e2e1",
                      "surface-container-low": "#1c1b1b",
                      "primary-container": "#e2e2e2",
                      "on-surface": "#e5e2e1",
                      "on-tertiary-container": "#636565",
                      "inverse-on-surface": "#313030",
                      "surface-variant": "#353434",
                      "surface-container-lowest": "#0e0e0e",
                      "surface-container": "#201f1f",
                      "on-error-container": "#ffdad6",
                      "surface-container-high": "#2a2a2a",
                      "secondary-container": "#464747",
                      "background": "#141313",
                      "tertiary-fixed-dim": "#c6c6c7",
                      "on-surface-variant": "#c4c7c8",
                      "on-secondary-container": "#b6b5b5",
                      "tertiary": "#ffffff",
                      "on-background": "#e5e2e1",
                      "surface-dim": "#141313",
                      "inverse-primary": "#5d5f5f",
                      "primary-fixed-dim": "#c6c6c7",
                      "on-secondary-fixed-variant": "#464747",
                      "primary": "#ffffff",
                      "on-tertiary-fixed": "#1a1c1c",
                      "on-secondary-fixed": "#1b1c1c",
                      "surface-bright": "#3a3939",
                      "primary-fixed": "#e2e2e2",
                      "error-container": "#93000a"
              },
              "borderRadius": {
                      "DEFAULT": "4px",
                      "lg": "4px",
                      "xl": "8px",
                      "full": "9999px"
              },
              "spacing": {
                      "unit": "4px",
                      "gutter": "16px",
                      "margin-mobile": "16px",
                      "density-high": "8px",
                      "section-gap": "80px",
                      "margin-desktop": "48px"
              },
              "fontFamily": {
                      "display-lg": ["Geist"],
                      "body-sm": ["Geist"],
                      "body-lg": ["Geist"],
                      "headline-sm": ["Geist"],
                      "label-md": ["Geist"],
                      "headline-lg": ["Geist"],
                      "display-sm": ["Geist"],
                      "display-lg-mobile": ["Geist"]
              },
              "fontSize": {
                      "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "800"}],
                      "body-sm": ["14px", {"lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400"}],
                      "body-lg": ["16px", {"lineHeight": "1.6", "letterSpacing": "-0.01em", "fontWeight": "400"}],
                      "headline-sm": ["20px", {"lineHeight": "1.4", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                      "label-md": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                      "headline-lg": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "display-sm": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.03em", "fontWeight": "700"}],
                      "display-lg-mobile": ["32px", {"lineHeight": "1.1", "letterSpacing": "-0.03em", "fontWeight": "800"}]
              }
            },
          },
        }
    </script>
<style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-black">
<!-- Mobile Viewport Container -->
<main class="w-full max-w-[780px] min-h-screen bg-surface-dim flex flex-col relative overflow-hidden">
<!-- Header (TopAppBar Context) -->
<header class="bg-surface-dim border-b border-outline-variant/30 sticky top-0 z-50">
<div class="px-gutter h-16 flex items-center justify-between">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-primary hover:opacity-80 transition-opacity active:scale-95 duration-200">arrow_back</button>
<h1 class="font-headline-sm text-headline-sm text-primary">Boblar ro'yxati</h1>
</div>
<button class="flex items-center gap-2 text-on-surface-variant font-label-md text-label-md hover:text-primary transition-colors" id="sortToggle">
<span id="sortLabel">Avval yangilari</span>
<span class="material-symbols-outlined text-[20px]">sort</span>
</button>
</div>
<!-- Search Bar Section -->
<div class="px-gutter pb-4">
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute left-4 text-outline group-focus-within:text-primary transition-colors">search</span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-DEFAULT py-3 pl-12 pr-4 text-body-lg font-body-lg text-on-surface focus:outline-none focus:border-primary focus:ring-0 transition-all placeholder:text-outline/60" placeholder="Boblarni qidirish" type="text"/>
</div>
</div>
</header>
<!-- Chapter List Content -->
<section class="flex-1 overflow-y-auto custom-scrollbar">
<div class="flex flex-col" id="chapter-container">
<!-- Active/Current Chapter -->
<div class="chapter-row flex items-center justify-between px-gutter py-4 min-h-[48px] bg-surface-container-high/40 border-l-2 border-primary cursor-pointer transition-all">
<div class="flex flex-col">
<span class="font-body-lg text-body-lg text-primary">1-jild 12-bob</span>
<span class="font-label-md text-label-md text-on-surface-variant/60">12.02.2024</span>
</div>
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</div>
<!-- Unread Chapters -->
<div class="chapter-row flex items-center justify-between px-gutter py-4 min-h-[48px] hover:bg-surface-container-low cursor-pointer transition-all group">
<div class="flex flex-col">
<span class="font-body-lg text-body-lg text-on-surface group-hover:text-primary">1-jild 11-bob</span>
<span class="font-label-md text-label-md text-on-surface-variant/60">10.02.2024</span>
</div>
</div>
<!-- Read Chapters (Muted) -->
<div class="chapter-row flex items-center justify-between px-gutter py-4 min-h-[48px] hover:bg-surface-container-low cursor-pointer transition-all opacity-50">
<div class="flex flex-col">
<span class="font-body-lg text-body-lg text-on-surface-variant">1-jild 10-bob</span>
<span class="font-label-md text-label-md text-on-surface-variant/40">08.02.2024</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant text-[18px]">check_circle</span>
</div>
<!-- Generated Placeholder Chapters -->
<div id="dynamic-chapters"></div>
</div>
</section>
<!-- Bottom Status/Quick Action (Optional shell relevance) -->
<footer class="bg-surface-container-lowest border-t border-outline-variant/30 px-gutter h-14 flex items-center justify-between">
<p class="font-label-md text-label-md text-on-surface-variant">JAMI: 12 BOBLAR</p>
<div class="flex gap-4">
<button class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors">cloud_download</button>
<button class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors">bookmark</button>
</div>
</footer>
</main>
<script>
    // Simple chapter list generator to fill the scrollable area
    const dynamicContainer = document.getElementById('dynamic-chapters');
    const chapters = [
        { vol: 1, ch: 9, date: '05.02.2024', read: true },
        { vol: 1, ch: 8, date: '01.02.2024', read: true },
        { vol: 1, ch: 7, date: '28.01.2024', read: true },
        { vol: 1, ch: 6, date: '25.01.2024', read: true },
        { vol: 1, ch: 5, date: '20.01.2024', read: true },
        { vol: 1, ch: 4, date: '15.01.2024', read: true },
        { vol: 1, ch: 3, date: '10.01.2024', read: true },
        { vol: 1, ch: 2, date: '05.01.2024', read: true },
        { vol: 1, ch: 1, date: '01.01.2024', read: true },
    ];

    chapters.forEach(chapter => {
        const div = document.createElement('div');
        div.className = `chapter-row flex items-center justify-between px-gutter py-4 min-h-[48px] hover:bg-surface-container-low cursor-pointer transition-all ${chapter.read ? 'opacity-50' : ''}`;
        div.innerHTML = `
            <div class="flex flex-col">
                <span class="font-body-lg text-body-lg ${chapter.read ? 'text-on-surface-variant' : 'text-on-surface'}">${chapter.vol}-jild ${chapter.ch}-bob</span>
                <span class="font-label-md text-label-md text-on-surface-variant/40">${chapter.date}</span>
            </div>
            ${chapter.read ? '<span class="material-symbols-outlined text-on-surface-variant text-[18px]">check_circle</span>' : ''}
        `;
        dynamicContainer.appendChild(div);
    });

    // Sort Toggle Interaction
    const sortToggle = document.getElementById('sortToggle');
    const sortLabel = document.getElementById('sortLabel');
    let ascending = false;

    sortToggle.addEventListener('click', () => {
        ascending = !ascending;
        sortLabel.textContent = ascending ? 'Avval eskilari' : 'Avval yangilari';
        // In a real app, this would re-order the DOM nodes
        sortToggle.classList.add('scale-95');
        setTimeout(() => sortToggle.classList.remove('scale-95'), 100);
    });

    // Search highlight interaction
    const searchInput = document.querySelector('input');
    searchInput.addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll('.chapter-row').forEach(row => {
            const text = row.innerText.toLowerCase();
            if (text.includes(val)) {
                row.style.display = 'flex';
            } else {
                row.style.display = 'none';
            }
        });
    });
</script>
</body></html>
