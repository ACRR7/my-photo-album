<script>
        // Micro-interactions for chips
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                if (this.classList.contains('genre-chip-inactive') || this.classList.contains('genre-chip-active')) {
                    this.classList.toggle('genre-chip-active');
                    this.classList.toggle('genre-chip-inactive');
                    if (this.classList.contains('genre-chip-active')) {
                        this.style.fontWeight = '700';
                    } else {
                        this.style.fontWeight = '400';
                    }
                }
            });
        });

        // Toggle button logic
        const toggleContainers = document.querySelectorAll('.flex.bg-\\[\\#0D0D0D\\]');
        toggleContainers.forEach(container => {
            const buttons = container.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('toggle-active'));
                    buttons.forEach(b => b.classList.add('text-on-surface-variant'));
                    btn.classList.add('toggle-active');
                    btn.classList.remove('text-on-surface-variant');
                });
            });
        });
    </script>
