<body class="min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-margin-desktop py-density-high bg-background dark:bg-background border-b border-outline-variant">
<div class="text-headline-lg font-headline-lg font-extrabold text-primary tracking-tighter uppercase">MANGA_HUB</div>
<div class="flex items-center gap-6">
<button class="text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 flex items-center gap-2">

</button>

<span class="material-symbols-outlined">language</span>

</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center pt-24 pb-12 px-margin-mobile">
<!-- Auth Container -->
<div class="w-full max-w-[400px] auth-card rounded-lg p-8 flex flex-col gap-8">
<!-- Tabs -->
<div class="flex w-full border-b border-[#1A1A1A]">
<button class="flex-1 py-4 text-center font-label-md text-label-md tab-active transition-all" id="loginTab" onclick="toggleAuth('login')">
                Kirish
            </button>
<button class="flex-1 py-4 text-center font-label-md text-label-md tab-inactive transition-all" id="registerTab" onclick="toggleAuth('register')">
                Ro'yxatdan o'tish
            </button>
</div>
<!-- Forms Container -->
<div id="forms-wrapper">
<!-- Login Form -->
<form class="flex flex-col gap-6" id="loginForm" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-2">
<label class="text-label-md font-label-md text-on-surface-variant">Foydalanuvchi nomi yoki elektron pochta</label>
<input class="input-field rounded-lg px-4 py-3 text-body-lg font-body-lg text-white placeholder:text-[#666666]" placeholder="manga_fan@example.com" type="text"/>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-label-md font-label-md text-on-surface-variant">Parol</label>
<a class="text-[10px] font-label-md text-on-surface-variant hover:text-white transition-colors" href="#">Parolni unutdingizmi?</a>
</div>
<input class="input-field rounded-lg px-4 py-3 text-body-lg font-body-lg text-white placeholder:text-[#666666]" placeholder="••••••••" type="password"/>
</div>
<button class="w-full bg-white text-black font-bold py-4 rounded-lg hover:opacity-90 active:scale-[0.98] transition-all text-body-lg font-body-lg">
                    Kirish
                </button>
</form>
<!-- Registration Form (Hidden Initially) -->
<form class="hidden flex flex-col gap-6" id="registerForm" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-2">
<label class="text-label-md font-label-md text-on-surface-variant">Foydalanuvchi nomi</label>
<input class="input-field rounded-lg px-4 py-3 text-body-lg font-body-lg text-white placeholder:text-[#666666]" placeholder="Kirill_99" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-label-md font-label-md text-on-surface-variant">Elektron pochta</label>
<input class="input-field rounded-lg px-4 py-3 text-body-lg font-body-lg text-white placeholder:text-[#666666]" placeholder="example@mail.uz" type="email"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-label-md font-label-md text-on-surface-variant">Parol</label>
<input class="input-field rounded-lg px-4 py-3 text-body-lg font-body-lg text-white placeholder:text-[#666666]" placeholder="Parol o'ylab toping" type="password"/>
</div>

<div class="h-24 lg:hidden"></div>
<script>
    function toggleAuth(type) {
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');

        if (type === 'login') {
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            loginTab.classList.remove('tab-inactive');
            loginTab.classList.add('tab-active');
            registerTab.classList.remove('tab-active');
            registerTab.classList.add('tab-inactive');
        } else {
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            loginTab.classList.add('tab-inactive');
            loginTab.classList.remove('tab-active');
            registerTab.classList.add('tab-active');
            registerTab.classList.remove('tab-inactive');
        }
    }

    // Micro-interaction for input fields
    document.querySelectorAll('.input-field').forEach(input => {
        input.addEventListener('focus', () => {
            const label = input.parentElement.querySelector('label');
            if (label) label.style.color = '#ffffff';
        });
        input.addEventListener('blur', () => {
            const label = input.parentElement.querySelector('label');
            if (label) label.style.color = '#c4c7c8';
        });
    });
</script>
